<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Migo AI | English Tutor</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside id="record-panel" class="side-panel">
            <div class="panel-header">
                <h3>📜 Academy Record</h3>
                <button onclick="toggleRecord()" class="close-panel-btn">✕</button>
            </div>
            <div id="correction-log" class="log-content"></div>
            <div class="panel-footer">
                <button onclick="clearHistory()" class="btn-danger-soft">Clear History</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="logo">Migo <span>AI</span></div>
                <div class="header-actions">
                    <button onclick="toggleRecord()" class="nav-btn mobile-only">📜 Record</button>
                    <button onclick="toggleTranslator()" class="nav-btn">🌐 Translator</button>
                </div>
            </header>

            <section id="chat-box" class="chat-area"></section>

            <footer class="input-footer">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Type in English..." autocomplete="off">
                    <button id="send-btn" onclick="sendMessage()">
                        <span class="desktop-text">Send Message</span>
                        <span class="mobile-icon">➤</span>
                    </button>
                </div>
            </footer>
        </main>

        <div id="translator-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Live Translator</h3>
                    <button onclick="toggleTranslator()">✕</button>
                </div>
                <textarea id="trans-input" placeholder="Translate English to Spanish..." oninput="debounceTranslate()"></textarea>
                <div id="trans-result" class="result-box">Result will appear here...</div>
            </div>
        </div>
    </div>
    <script src="script.js?v=2"></script>
</body>
</html>
