<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Migo AI | Pro Tutor</title>
    <link rel="stylesheet" href="style.css?v=6.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside id="record-panel" class="side-panel left">
            <div class="panel-header">
                <h3>📜 Academy Record</h3>
                <button onclick="toggleRecord()" class="close-panel-btn">✕</button>
            </div>
            <div id="correction-log" class="log-content"></div>
            <div class="panel-footer">
                <button onclick="clearHistory()" class="btn-danger-soft">Clear History</button>
            </div>
        </aside>

        <aside id="translator-panel" class="side-panel right">
            <div class="panel-header">
                <h3>🌐 Translator Tools</h3>
                <button onclick="toggleTranslator()" class="close-panel-btn">✕</button>
            </div>
            <div class="log-content">
                <div class="trans-group">
                    <label>English to Spanish</label>
                    <textarea id="en-input" placeholder="Type here..." oninput="autoTranslate('en-es')"></textarea>
                    <div id="en-es-result" class="res-box">Result...</div>
                </div>
                <div style="height: 2rem;"></div>
                <div class="trans-group">
                    <label>Español a Inglés</label>
                    <textarea id="es-input" placeholder="Escribe aquí..." oninput="autoTranslate('es-en')"></textarea>
                    <div id="es-en-result" class="res-box">Resultado...</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="logo">Migo <span>AI</span></div>
                <div class="header-actions">
                    <button onclick="toggleRecord()" class="nav-btn">📜 Record</button>
                    <button onclick="toggleTranslator()" class="nav-btn-alt">🌐 Translator</button>
                </div>
            </header>

            <section id="chat-box" class="chat-area"></section>

            <footer class="input-footer">
                <div id="lock-notice" class="lock-message" style="display:none;">⚠️ Correct your mistake to unlock the chat</div>
                <div class="input-wrapper" id="input-container">
                    <input type="text" id="user-input" placeholder="Talk to Migo..." autocomplete="off">
                    <button id="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </footer>
        </main>
    </div>
    <script src="script.js?v=6.0"></script>
</body>
</html>
