<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migo AI | Academy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar left">
            <div class="sidebar-header">
                <h2>Academy Record</h2>
                <div id="correction-log" class="log-container"></div>
            </div>
        </aside>
        <main class="chat-main">
            <header class="chat-header">
                <h1>Migo AI</h1>
                <div class="header-btns">
                    <button onclick="setupKey()" class="nav-btn-alt">API Config</button>
                    <button onclick="document.getElementById('tools-panel').classList.toggle('hidden')" class="nav-btn">Traduction</button>
                </div>
            </header>
            <section class="conversation-area">
                <div class="chat-controls">
                    <select id="mode-select" class="nav-select"><option value="Grammar">Grammar Focus</option></select>
                    <select id="tone-select" class="nav-select"><option value="Elegant">Style: Elegant</option></select>
                </div>
                <div id="chat-box" class="chat-display"></div>
                <div class="chat-input-wrapper">
                    <input type="text" id="user-input" placeholder="Escribe en inglés..." autocomplete="off">
                </div>
            </section>
        </main>
        <aside id="tools-panel" class="sidebar right hidden">
            <div class="translator-container">
                <label>English to Spanish (Real-time)</label>
                <textarea id="en-to-es-input" oninput="debounceTranslate('en')"></textarea>
                <div id="en-to-es-result" class="translate-result"></div>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
