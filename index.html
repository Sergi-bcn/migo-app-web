<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migo AI | Academy Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">M</div>
                <span>Migo Academy</span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Total Errors</span>
                    <span id="total-count" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Most Common</span>
                    <span id="top-error-type" class="stat-value">-</span>
                </div>
            </div>

            <div class="history-controls">
                <h3>Academy Record</h3>
                <div class="actions-row">
                    <select id="error-filter" onchange="renderLog()">
                        <option value="all">Ver Todos</option>
                        <option value="Grammar">Grammar</option>
                        <option value="Spelling">Spelling</option>
                        <option value="Vocabulary">Vocabulary</option>
                    </select>
                    <button onclick="exportToCSV()" class="btn-export" title="Exportar Raport Completo (Excel)">📊 Report</button>
                </div>
            </div>
            <div id="correction-log" class="log-scroll"></div>
            <button onclick="clearHistory()" class="btn-clear">Limpiar Historial</button>
        </aside>

        <main class="workspace">
            <header class="navbar">
                <div class="nav-left">
                    <span id="status-dot" class="status-dot"></span>
                    <span id="mode-indicator">Modo Conversación</span>
                </div>
                <div class="nav-right">
                    <button onclick="setupKey()" class="btn-ghost">Settings</button>
                    <button id="toggle-trans" class="btn-accent">Translator Tool</button>
                </div>
            </header>

            <div id="chat-box" class="chat-viewport"></div>

            <footer class="input-area">
                <div id="correction-hint" class="correction-hint hidden">
                    💡 <b>Correction needed:</b> <span id="hint-text"></span>
                </div>
                <div class="input-container" id="input-container">
                    <input type="text" id="user-input" placeholder="Type in English..." autocomplete="off">
                    <button onclick="sendMessage()" class="send-circle">↑</button>
                </div>
            </footer>
        </main>

        <div id="translator-panel" class="trans-panel hidden">
            <div class="trans-header">
                <h3>Quick Translator</h3>
                <button onclick="document.getElementById('translator-panel').classList.add('hidden')" class="close-btn">×</button>
            </div>
            <div class="trans-body">
                <div class="input-block">
                    <label>SPANISH → ENGLISH</label>
                    <textarea id="es-to-en-input" oninput="debounceTranslate('es')"></textarea>
                    <div id="es-to-en-result" class="live-result"></div>
                </div>
                <div class="input-block">
                    <label>ENGLISH → SPANISH</label>
                    <textarea id="en-to-es-input" oninput="debounceTranslate('en')"></textarea>
                    <div id="en-to-es-result" class="live-result"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
